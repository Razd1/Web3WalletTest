    <style>
    /* 增加基础字体设置，让移动端显示更现代 */
    body { background: #f4f7f6; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    /* --- 新增：主标题样式 --- */
    .page-title { 
        text-align: center; 
        color: #1a73e8; 
        font-size: 22px; 
        font-weight: bold; 
        margin-top: 10px;
        margin-bottom: 20px; 
    }

    .v-section { margin-bottom: 20px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; }
    .v-title { 
        font-size: 18px; font-weight: bold; color: #1a73e8; 
        border-bottom: 2px solid #e8f0fe; padding-bottom: 8px; margin-bottom: 12px; 
    }
    .mutation-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .test-btn { 
        padding: 12px; background: #fff; border: 1px solid #1a73e8; 
        color: #1a73e8; border-radius: 6px; font-weight: 500; text-align: left;
        transition: all 0.2s;
    }
    .test-btn:active { background: #1a73e8; color: white; }
    .log-panel { background: #000; color: #0f0; padding: 10px; border-radius: 8px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1 class="page-title">web3wallet自动化测试</h1>

    <div id="test-container" class="btn-list">
        </div>
    
    <div id="log-panel"></div>
